<!DOCTYPE html>

<head>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap');
  /* KPK dashboard — brand palette (Ecru-dominant), Lexend, monochrome.
     Canvas lightened from raw Ecru for legibility; Ecru kept for surfaces/bars. */
  :root {
    --bg:        #EFEEEA;      /* light warm off-white — readable canvas */
    --surface:   #FFFFFF;      /* white cards */
    --surface-2: #E7E6E2;      /* Ecru-tint — secondary fills, table stripes */
    --raised:    #DCDBD4;      /* bar tracks */
    --hairline:  #DBDAD3;
    --hairline-2:#E5E4DE;
    /* text — Anthracite, with darker muted tones for contrast */
    --text:      #1C1C1A;      /* Anthracite */
    --muted:     #55544E;
    --muted-2:   #706F66;
    /* roles — monochrome in brand tones; direction carried by sign/arrows */
    --deployed:  #1F1F1F;      /* Anthracite ink — emphasis / positive / "KPK" / deployed */
    --deployed-bg:#E8E7E5;
    --deployed-dim:#C6C5BE;
    --idle:      #B4B3AC;      /* light — idle / benchmark reference */
    --idle-bg:   #E8E7E5;
    --eth:       #6C6B67;      /* mid */
    --eur:       #97968F;      /* lighter */
    --warn:      #6C6B67;      /* negatives (▼ + sign carries direction) */
    --logo-text: "KPK";
    /* type — Lexend (brand). Numbers use Lexend with tabular figures. */
    --font-label: "Lexend", ui-sans-serif, "Inter", system-ui, "Helvetica Neue", Arial, sans-serif;
    --font-mono:  "Lexend", ui-sans-serif, "Inter", system-ui, sans-serif;
    --maxw: 1160px;
    --r-lg: 14px; --r-md: 10px; --r-sm: 7px;
    --shadow: 0 1px 2px rgba(31,31,31,.05), 0 10px 28px -18px rgba(31,31,31,.20);
  }

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: var(--font-label);
    font-feature-settings: "tnum" 1, "lnum" 1, "cv05" 1;
    line-height: 1.5; letter-spacing: .1px; -webkit-font-smoothing: antialiased;
  }
  .num { font-family: var(--font-mono); font-variant-numeric: tabular-nums lining-nums; }
  .wrap { max-width: var(--maxw); margin: 0 auto; padding: 30px 26px 100px; }

  /* ---- top bar ---- */
  .topbar { display:flex; align-items:center; justify-content:space-between; gap:16px;
            padding-bottom:20px; border-bottom:1px solid var(--hairline); }
  .brand { display:flex; align-items:center; gap:11px; }
  .logo-mark { display:inline-flex; }
  .logo-mark svg { height:28px; width:28px; display:block; }
  .brand .logo { font-family:var(--font-label); font-weight:700; font-size:26px; letter-spacing:2px; color:var(--text); }
  .brand .logo::before { content: var(--logo-text); }
  .brand .sub { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:2.5px; }
  .meta { text-align:right; color:var(--muted); font-size:12px; }
  .meta .num { color:var(--text); }
  .badge { display:inline-block; margin-left:8px; padding:2px 8px; border:1px solid var(--warn);
           color:var(--warn); border-radius:999px; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; }

  /* ---- hero ---- */
  .hero { padding:46px 0 6px; }
  .hero .eyebrow { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:3px; }
  .hero .total { font-family:var(--font-mono); font-size:clamp(42px,8vw,88px); font-weight:600;
                 line-height:1.0; margin:14px 0 4px; letter-spacing:-2px; }
  .hero .total .cur { color:var(--muted-2); font-size:.44em; vertical-align:middle; margin-right:8px; }
  .hero .accent-rule { width:56px; height:3px; background:var(--deployed); margin:18px 0 24px; border-radius:2px; }

  /* deployed / idle reconciliation bar — the key new device */
  .alloc { max-width:680px; }
  .alloc .splitbar { display:flex; height:12px; border-radius:999px; overflow:hidden; background:var(--raised); }
  .alloc .seg { height:100%; }
  .alloc .seg.dep  { background:var(--deployed); }
  .alloc .seg.idle { background:var(--idle); }
  .alloc .legend { display:flex; flex-wrap:wrap; gap:10px 28px; margin-top:14px; }
  .alloc .leg { display:flex; align-items:baseline; gap:9px; font-size:13px; }
  .alloc .leg .sw { width:9px; height:9px; border-radius:50%; align-self:center; }
  .alloc .leg .sw.dep { background:var(--deployed); } .alloc .leg .sw.idle { background:var(--idle); }
  .alloc .leg .lab { color:var(--muted); } .alloc .leg .val { font-family:var(--font-mono); color:var(--text); }
  .alloc .leg .pc { color:var(--muted-2); font-family:var(--font-mono); font-size:12px; }
  .alloc .recon { margin-top:10px; font-size:11.5px; color:var(--muted-2); }

  .stats { display:flex; flex-wrap:wrap; gap:26px 48px; margin-top:30px;
           padding-top:26px; border-top:1px solid var(--hairline); }
  .stat .k { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:1.5px; }
  .stat .v { font-family:var(--font-mono); font-size:20px; margin-top:5px; }

  /* ---- section headers ---- */
  .section { margin-top:54px; }
  .section > h2 { font-size:12px; text-transform:uppercase; letter-spacing:2.5px; color:var(--muted);
                  font-weight:600; margin:0 0 18px; padding-bottom:12px; border-bottom:1px solid var(--hairline); }

  /* ---- denomination cards ---- */
  .denoms { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
  .panel { background:var(--surface); border:1px solid var(--hairline); border-radius:var(--r-lg);
           padding:24px; box-shadow:var(--shadow); }
  .panel .ph { display:flex; align-items:center; justify-content:space-between; }
  .panel .ph .name { display:flex; align-items:center; gap:9px; font-family:var(--font-mono); font-size:15px; letter-spacing:1px; }
  .panel .ph .pos { color:var(--muted); font-size:11px; }
  .panel .native { font-family:var(--font-mono); font-size:30px; margin:18px 0 2px; letter-spacing:-.5px; }
  .panel .native .u { color:var(--muted-2); font-size:.45em; margin-left:7px; }
  .panel .usd { color:var(--muted); font-size:13px; font-family:var(--font-mono); }
  .panel .minisplit { margin:18px 0 4px; }
  .panel .di { display:flex; justify-content:space-between; font-size:11.5px; color:var(--muted); margin-bottom:7px; }
  .panel .di .num { color:var(--text); }
  .panel .apyrow { display:flex; align-items:flex-end; justify-content:space-between;
                   margin-top:18px; padding-top:16px; border-top:1px solid var(--hairline-2); }
  .panel .apy .k { color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:1.5px; display:block; margin-bottom:3px; }
  .panel .apy .v { font-size:25px; color:var(--deployed); font-family:var(--font-mono); font-weight:600; }
  .panel .apy .note { color:var(--muted-2); font-size:10px; margin-top:2px; }
  .spark { width:150px; height:34px; display:block; }
  .sparkwrap { margin-top:8px; display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
  .sparklab { font-size:9.5px; color:var(--muted-2); text-transform:uppercase; letter-spacing:1.2px; }

  /* bar entrance animation (grows from the baseline; replays on redraw) */
  @keyframes barGrow { from { transform: scaleY(0); } to { transform: scaleY(1); } }
  .chart rect.bar { transform-box: fill-box; transform-origin: bottom; animation: barGrow .55s cubic-bezier(.22,.9,.35,1) both; }
  @media (prefers-reduced-motion: reduce) { .chart rect.bar { animation: none; } }

  /* thin two-tone split bar (denominations + clients) */
  .tbar { display:flex; height:7px; border-radius:999px; overflow:hidden; background:var(--raised); }
  .tbar .s { height:100%; } .tbar .s.dep { background:var(--deployed); } .tbar .s.idle { background:var(--idle); }

  /* denomination dot */
  .dot { width:9px; height:9px; border-radius:50%; display:inline-block; }
  .dot.USD { background:var(--deployed); } .dot.ETH { background:var(--eth); } .dot.EUR { background:var(--eur); }

  /* ---- clients ---- */
  .clients { display:flex; flex-direction:column; gap:14px; }
  .client { background:var(--surface); border:1px solid var(--hairline); border-radius:var(--r-lg);
            padding:22px 24px; box-shadow:var(--shadow); }
  .client .ch { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; }
  .client .nm { font-size:17px; font-weight:650; letter-spacing:-.2px; }
  .client .meta2 { color:var(--muted); font-size:11.5px; margin-top:4px; }
  .client .tot { font-family:var(--font-mono); font-size:23px; text-align:right; letter-spacing:-.5px; }
  .client .share { color:var(--muted); font-size:11px; text-align:right; font-family:var(--font-mono); margin-top:2px; }
  .client .splitline { display:flex; justify-content:space-between; font-size:11.5px; color:var(--muted); margin:16px 0 8px; }
  .client .splitline .num { color:var(--text); }
  .client .splitline .idleflag { color:var(--idle); }
  .mini { display:flex; gap:24px; flex-wrap:wrap; align-items:center; margin-top:14px; }
  .mini .m { font-family:var(--font-mono); font-size:12.5px; display:flex; align-items:center; gap:7px; }
  .mini .m .k { color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:1px; }
  .mini .m .a { color:var(--deployed); }
  .cov { color:var(--muted); font-size:10.5px; }

  /* ---- expandable positions ---- */


  /* ---- KPI band (right under the AUM) ---- */
  .kpis { display:grid; grid-template-columns:repeat(6,1fr); gap:1px; margin-top:30px;
          background:var(--hairline); border:1px solid var(--hairline); border-radius:var(--r-lg);
          overflow:hidden; box-shadow:var(--shadow); }
  .kpi { position:relative; background:var(--surface); padding:20px 20px 18px; min-width:0;
         transition:background .15s ease; }
  .kpi:hover { background:#FDFDFC; }
  .kpi::before { content:""; position:absolute; top:0; left:20px; right:20px; height:2px;
                 background:var(--raised); border-radius:0 0 2px 2px; }
  .kpi .k { color:var(--muted); font-size:9.5px; text-transform:uppercase; letter-spacing:1.7px;
            font-weight:600; line-height:1.4; }
  .kpi .v { font-family:var(--font-mono); font-size:clamp(21px, 1.9vw, 27px); font-weight:600;
            margin-top:9px; letter-spacing:-.5px; line-height:1.05; white-space:nowrap; }
  .kpi .v.green { color:var(--deployed); } .kpi .v.idle { color:var(--idle); }
  .kpi .sub { color:var(--muted-2); font-size:10.5px; margin-top:6px; line-height:1.45; }
  @media (max-width:1080px){ .kpis{ grid-template-columns:repeat(3,1fr);} }
  @media (max-width:640px){ .kpis{ grid-template-columns:repeat(2,1fr);} .kpi{ padding:16px 16px 14px; } }

  /* ---- insight cards ---- */
  .icard { background:var(--surface); border:1px solid var(--hairline); border-radius:var(--r-lg); padding:18px 20px; box-shadow:var(--shadow); }
  .icard .k { color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:1.4px; }
  .icard .v { font-family:var(--font-mono); font-size:25px; margin:9px 0 2px; letter-spacing:-.5px; }
  .icard .v.warn { color:var(--warn); } .icard .v.idle { color:var(--idle); }
  .icard .sub { color:var(--muted-2); font-size:11px; margin-top:6px; line-height:1.5; }

  /* ---- composition / donut charts ---- */
  .composition { background:var(--surface); border:1px solid var(--hairline); border-radius:var(--r-lg); padding:22px 24px; box-shadow:var(--shadow); }
  .comp-head { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
  .comp-head .t { font-size:14px; font-weight:650; }
  .toggle { display:inline-flex; border:1px solid var(--hairline); border-radius:999px; overflow:hidden; }
  .toggle button { font-family:inherit; font-size:11px; letter-spacing:.3px; padding:6px 15px; border:0; background:var(--surface); color:var(--muted); cursor:pointer; }
  .toggle button.active { background:var(--text); color:#fff; }
  .comp-body { display:flex; align-items:center; gap:34px; flex-wrap:wrap; }
  .donut { width:100%; height:auto; display:block; }          /* scales to its container */
  .comp-body > .donut { width:188px; flex:0 0 auto; }          /* fixed size for the firm pie */
  .donut .slice { transition:opacity .12s ease; cursor:default; }
  .donut .slice:hover { opacity:.74; }
  .donut .dc-top { font-family:var(--font-mono); font-size:18px; fill:var(--text); font-weight:600; }
  .donut .dc-bot { font-size:8px; fill:var(--muted); text-transform:uppercase; letter-spacing:1.3px; }
  .dlegend { flex:1; min-width:220px; display:flex; flex-direction:column; }
  .lrow { display:grid; grid-template-columns:14px 1fr auto auto; align-items:center; gap:13px; font-size:13px; padding:9px 0; border-bottom:1px solid var(--hairline-2); }
  .lrow:last-child { border-bottom:none; }
  .ldot { width:11px; height:11px; border-radius:3px; }
  .llab { color:var(--text); } .lval { color:var(--text); font-family:var(--font-mono); } .lpct { color:var(--muted); font-family:var(--font-mono); font-size:12px; min-width:46px; text-align:right; }
  .hidden { display:none; }

  /* client card body with its own allocation donut */
  .cbody { display:flex; gap:26px; align-items:center; margin-top:16px; }
  .cdonut { flex:0 0 auto; width:118px; }
  .cinfo { flex:1; min-width:0; }
  @media (max-width:620px){ .comp-body{ gap:18px;} .cbody{ flex-direction:column; align-items:stretch;} .cdonut{ align-self:center;} }

  /* ---- benchmark comparison ---- */
  .benchgrid { display:grid; grid-template-columns:repeat(2,1fr); gap:18px; }
  .benchcard { background:var(--surface); border:1px solid var(--hairline); border-radius:var(--r-lg);

  .pill { font-family:var(--font-mono); font-size:12px; font-weight:600; padding:3px 10px; border-radius:999px; }
  .pill.up { color:var(--deployed); background:var(--deployed-bg); }
  .pill.down { color:var(--warn); background:#E8E7E5; }
  .benchcard .cap { color:var(--muted); font-size:11.5px; margin:2px 0 8px; }
  .chart { width:100%; height:auto; display:block; }

  /* ---- top holdings table ---- */

  /* per-denomination performance blocks */

  /* ---- return profile + print ---- */
  .alphahead { background:var(--deployed-bg); border:1px solid var(--deployed-dim); border-radius:var(--r-lg); padding:20px 24px; margin-bottom:18px; }

  .alphahead .ah-k { color:var(--muted); font-size:13px; }
  .alphahead .ah-sub { color:var(--muted); font-size:12px; margin-top:9px; }
  /* per-client alpha row */
  .calpha { display:flex; align-items:baseline; gap:12px; margin-top:14px; padding-top:13px; border-top:1px solid var(--hairline-2); }
  .calpha .ca-k { color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:1.2px; }
  .calpha .ca-v { font-family:var(--font-mono); font-weight:600; font-size:15px; margin-left:auto; }
  .calpha .ca-x { font-family:var(--font-mono); font-size:12px; color:var(--muted); }
  .calpha.pos .ca-v { color:var(--deployed); } .calpha.neg .ca-v { color:var(--warn); }
  /* prospect visuals: mandate alpha bars + per-$1M value */
  /* interactivity: floating tooltip + cursors */
  .tt { position:fixed; z-index:9999; pointer-events:none; background:var(--text); color:#fff;
        font-family:var(--font-mono); font-size:11.5px; line-height:1.3; padding:6px 9px; border-radius:6px;
        box-shadow:0 6px 20px rgba(20,21,23,.22); white-space:nowrap; opacity:.97; }
  .donut .slice { cursor:pointer; }
  .chart .bar { cursor:pointer; } .hbar { cursor:default; }
  /* AUM trend + cumulative alpha charts */
  .chip { font-family:inherit; font-size:11px; padding:5px 11px; border:1px solid var(--hairline); background:var(--surface); color:var(--muted); border-radius:999px; cursor:pointer; }
  .chip:hover { border-color:var(--muted-2); }
  .chip.on { background:var(--text); color:#fff; border-color:var(--text); }
  /* client performance vs benchmark (interactive selector) */
  .cperf-chips { display:flex; flex-wrap:wrap; gap:6px; }
  .cp-empty { color:var(--muted-2); font-size:12px; padding:14px 0; }

  @media print {
    @page { margin: 13mm; }
    * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
    body { background:#fff; }
    .wrap { max-width:none; padding:0 0 8px; }
    .section { margin-top:26px; }
    .section, .client, .panel, .benchcard, .composition, .icard, .kpis { break-inside:avoid; }
    .toggle, .cperf-chips { display:none; }                 /* interactive-only, irrelevant on paper */
    a { text-decoration:none; }
  }

  /* ---- moved funds ---- */
  .moved { margin-top:48px; background:var(--surface-2); border:1px dashed var(--muted-2); border-radius:var(--r-lg); padding:22px 24px; }
  .moved .k { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:2px; }
  .moved .v { font-family:var(--font-mono); font-size:30px; margin-top:6px; }
  .moved .note { color:var(--muted-2); font-size:11px; margin-top:6px; max-width:640px; }

  /* ---- footnote ---- */
  .foot { margin-top:56px; padding-top:20px; border-top:1px solid var(--hairline); color:var(--muted); font-size:11.5px; max-width:800px; }
  .foot strong { color:var(--text); font-weight:600; }
  .empty { color:var(--muted-2); font-size:10px; font-style:italic; }
  :focus-visible { outline:2px solid var(--deployed); outline-offset:2px; border-radius:3px; }

  @media (max-width:860px) {
    .denoms { grid-template-columns:1fr; }
    .meta { font-size:11px; } .htable .nm2 { display:none; }
    .hero .total { letter-spacing:-1px; }
  }
  @media (prefers-reduced-motion: reduce) { * { transition:none !important; animation:none !important; scroll-behavior:auto; } }
</style>

<script>
(function () {
  "use strict";

  function fmtUsd(n, max) {
    if (n == null || isNaN(n)) return "n/a";
    return new Intl.NumberFormat("en-US", { style:"currency", currency:"USD", maximumFractionDigits: max==null?0:max }).format(n);
  }
  function fmtCompact(n) {
    if (n == null || isNaN(n)) return "n/a";
    var sign = n < 0 ? "-" : "";
    return sign + "$" + new Intl.NumberFormat("en-US", { notation:"compact", maximumFractionDigits:2 }).format(Math.abs(n));
  }
  function fmtNum(n, dp) {
    if (n == null || isNaN(n)) return "n/a";
    return new Intl.NumberFormat("en-US", { maximumFractionDigits: dp==null?2:dp }).format(n);
  }
  function pct(n) { return (n==null||isNaN(n)) ? "n/a" : fmtNum(n,2) + "%"; }
  function share(part, whole) { return whole ? fmtNum(100*part/whole, 1) + "%" : "0%"; }
  function esc(s) { return String(s==null?"":s).replace(/[&<>"]/g, function (c) {
    return ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" })[c]; }); }
  function shortAddr(a) { return (a && a.length>12) ? a.slice(0,6)+"…"+a.slice(-4) : a; }

  // Curved mini-sparkline (Catmull-Rom smoothed) for per-client AUM history.
  function sparkline(series, w, h) {
    w = w||150; h = h||34;
    if (!series || series.length<2) return '';
    var vals = series.map(function(p){return p.value;});
    var min = Math.min.apply(null,vals), max = Math.max.apply(null,vals);
    var span = (max-min)||1, pad = 3;
    var coords = series.map(function(p,i){
      return [pad + (i/(series.length-1))*(w-2*pad), pad + (1-(p.value-min)/span)*(h-2*pad)];
    });
    var last = coords[coords.length-1];
    var tip = fmtNum(series.length,0)+' points · '+series[0].date+' → '+series[series.length-1].date;
    return '<svg class="spark" viewBox="0 0 '+w+' '+h+'" role="img" aria-label="AUM history" data-tip="'+esc(tip)+'">'+
           '<path d="'+smoothPath(coords)+'" fill="none" stroke="var(--muted-2)" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>'+
           '<circle cx="'+last[0].toFixed(1)+'" cy="'+last[1].toFixed(1)+'" r="2.6" fill="var(--text)"/></svg>';
  }

  // two-tone deployed/idle bar
  function tbar(deployed, idle) {
    var total = (deployed||0) + (idle||0);
    var dp = total ? (deployed/total)*100 : 0;
    var ip = total ? (idle/total)*100 : 0;
    return '<div class="tbar" role="img" aria-label="'+share(deployed,total)+' deployed, '+share(idle,total)+' idle">'+
           '<span class="s dep" style="width:'+dp+'%"></span><span class="s idle" style="width:'+ip+'%"></span></div>';
  }

  function denomPanel(code, b, series) {
    var native = (b.native_value==null)
      ? '<div class="native">'+fmtUsd(b.value_usd)+'<span class="u">USD</span></div>'+
        '<div class="usd empty">native unit unavailable (no reference price)</div>'
      : '<div class="native">'+(code==="USD"?fmtUsd(b.native_value):fmtNum(b.native_value, code==="ETH"?2:0))+
        (code==="USD"?"":'<span class="u">'+esc(b.native_unit)+'</span>')+'</div>'+
        '<div class="usd">'+fmtUsd(b.value_usd)+'</div>';
    var estY = (b.deployed_usd || 0) * (b.avg_apy_pct || 0) / 100;
    return '<div class="panel">'+
      '<div class="ph"><span class="name"><span class="dot '+code+'"></span>'+esc(code)+'</span>'+
      '<span class="pos">'+b.positions+' positions</span></div>'+
      native +
      '<div class="minisplit">'+
        '<div class="di"><span>Deployed <span class="num">'+fmtUsd(b.deployed_usd)+'</span></span>'+
        (b.idle_usd?'<span>Idle <span class="num">'+fmtUsd(b.idle_usd)+'</span></span>':'')+'</div>'+
        tbar(b.deployed_usd, b.idle_usd)+
      '</div>'+
      '<div class="apyrow">'+
        '<div class="apy"><span class="k">Weighted APY · deployed</span><span class="v">'+pct(b.avg_apy_pct)+'</span></div>'+
        '<div class="apy" style="text-align:right"><span class="k">Est. yield / yr</span>'+
          '<span class="v" style="font-size:19px;color:var(--text)">'+fmtCompact(estY)+'</span></div>'+
      '</div></div>';
  }

  function clientCard(c, maxTotal, history, benchmarks) {
    // Per-denomination yield (aggregate, not line-by-line): value + deployed APY.
    var mini = ["USD","ETH","EUR"].map(function (code) {
      var b = c.buckets[code] || { value_usd:0, avg_apy_pct:0 };
      if (!b.value_usd) return "";
      return '<div class="m"><span class="dot '+code+'"></span><span class="k">'+code+'</span>'+
             fmtUsd(b.value_usd)+' · <span class="a">'+pct(b.avg_apy_pct)+'</span></div>';
    }).join("");

    var splitline = '<div class="splitline">'+
      '<span>Deployed <span class="num">'+fmtUsd(c.deployed_usd)+'</span> · '+share(c.deployed_usd,c.total_usd)+'</span>'+
      (c.idle_usd ? '<span class="idleflag">Idle <span class="num">'+fmtUsd(c.idle_usd)+'</span> · '+share(c.idle_usd,c.total_usd)+'</span>' : '<span class="cov">fully deployed</span>')+
      '</div>';

    // Per-client alpha vs benchmark — the active-management track record, with NO
    // position-level / wallet-level allocation detail.
    var bench = null, alpha = null;
    if (benchmarks && benchmarks.enabled) {
      var cw = benchmarks.current_window;
      bench = { USD: (benchmarks.USD.benchmark||{})[cw], ETH: (benchmarks.ETH.benchmark||{})[cw] };
      alpha = clientAlpha(c, bench);
    }
    var alphaRow = (alpha && alpha.base) ? '<div class="calpha '+(alpha.excess>=0?'pos':'neg')+'">'+
      '<span class="ca-k">Alpha vs benchmark</span>'+
      '<span class="ca-v">'+(alpha.bps>=0?'▲ +':'▼ ')+fmtNum(Math.abs(alpha.bps),0)+' bps</span>'+
      '<span class="ca-x">'+(alpha.excess>=0?'+':'')+fmtCompact(alpha.excess)+' / yr</span></div>' : '';

    var cdonut = donut(clientDenomSegs(c), { size:118, thickness:18, centerTop:fmtCompact(c.total_usd), centerBottom:"AUM" });

    var series = (history && history.by_client && history.by_client[c.name]) || [];
    var spark = sparkline(series);
    var sparkBlock = spark ? '<div class="sparkwrap">'+spark+'<span class="sparklab">6-month AUM</span></div>' : '';

    return '<article class="client">'+
      '<div class="ch"><div><div class="nm">'+esc(c.name)+'</div>'+
      '<div class="meta2">'+fmtNum(c.share_pct,1)+'% of firm AUM · '+share(c.deployed_usd,c.total_usd)+' deployed</div></div>'+
      '<div style="text-align:right"><div class="tot">'+fmtUsd(c.total_usd)+'</div>'+sparkBlock+'</div></div>'+
      '<div class="cbody"><div class="cdonut">'+cdonut+'</div><div class="cinfo">'+
        splitline + tbar(c.deployed_usd, c.idle_usd)+
        '<div class="mini">'+(mini||'<span class="empty">no classified positions</span>')+'</div>'+
        alphaRow +
      '</div></div></article>';
  }

  // ---- active-management metrics (alpha vs benchmark) --------------------
  function firmAlpha(d) {
    var f = d.firm, b = d.benchmarks || {};
    if (!b.enabled) return null;
    var cur = b.current_window, bench = { USD: (b.USD.benchmark || {})[cur], ETH: (b.ETH.benchmark || {})[cur] };
    var a = { cur: cur, bench: bench, excess_usd: 0, benchmarked: 0, beat_usd: 0, parts: {} };
    ["USD", "ETH"].forEach(function (code) {
      var bk = f.buckets[code], bm = bench[code];
      // alpha base = capital with OBSERVED yield (measured_usd); supplements
      // counted in AUM but never attributed the measured spread.
      var base = (bk.measured_usd != null) ? bk.measured_usd : bk.deployed_usd;
      if (bm == null || !base) return;
      var ex = base * (bk.avg_apy_pct - bm) / 100;
      a.parts[code] = { dep: base, apy: bk.avg_apy_pct, bench: bm, delta: bk.avg_apy_pct - bm, excess: ex };
      a.excess_usd += ex; a.benchmarked += base;
    });
    d.clients.forEach(function (c) { (c.wallets || []).forEach(function (w) { (w.holdings || []).forEach(function (h) {
      if (h.is_idle || h.apy_excluded || (h.bucket !== "USD" && h.bucket !== "ETH")) return;
      var bm = bench[h.bucket]; if (bm != null && h.apy_pct >= bm) a.beat_usd += h.value_usd;
    }); }); });
    a.bps = a.benchmarked ? (a.excess_usd / a.benchmarked) * 10000 : 0;
    a.pct_beating = a.benchmarked ? (a.beat_usd / a.benchmarked) * 100 : 0;
    return a;
  }

  function clientAlpha(c, bench) {
    if (!bench) return null;
    var ex = 0, base = 0;
    ["USD", "ETH"].forEach(function (code) {
      var bk = c.buckets[code], bm = bench[code];
      var mb = (bk.measured_usd != null) ? bk.measured_usd : bk.deployed_usd;
      if (bm == null || !mb) return;
      ex += mb * (bk.avg_apy_pct - bm) / 100; base += mb;
    });
    return { excess: ex, bps: base ? (ex / base) * 10000 : 0, base: base };
  }

  // ---- KPI band: active-management headline metrics ----------------------
  function kpiBand(d) {
    var f = d.firm, s = f.stats || {}, a = firmAlpha(d);
    var tiles = [
      { k: "Capital deployed", v: share(f.deployed_usd, f.total_usd), cls: "green",
        sub: fmtCompact(f.deployed_usd) + " actively deployed · " + share(f.idle_usd, f.total_usd) + " operating cash" },
      { k: "Annual excess return", v: a ? ((a.excess_usd >= 0 ? "+" : "") + fmtCompact(a.excess_usd)) : "n/a",
        cls: a && a.excess_usd >= 0 ? "green" : "warn", sub: "alpha vs benchmark, run-rate (USD + ETH)" },
      { k: "Active return", v: a ? ((a.bps >= 0 ? "+" : "") + fmtNum(a.bps, 0) + " bps") : "n/a",
        cls: a && a.bps >= 0 ? "green" : "warn", sub: "capital-weighted excess over benchmark" },
      { k: "Beating benchmark", v: a ? share(a.beat_usd, a.benchmarked) : "n/a", cls: "green",
        sub: "of benchmarked deployed capital" },
      { k: "Mandates", v: fmtNum(f.clients, 0), cls: "", sub: "DAO treasuries under management" },
      { k: "Strategies", v: fmtNum(s.protocol_count, 0), cls: "",
        sub: "protocols across " + (s.chains || []).join(" · ") }
    ];
    return '<div class="kpis">' + tiles.map(function (t) {
      return '<div class="kpi"><div class="k">' + esc(t.k) + '</div><div class="v ' + t.cls + '">' + t.v + '</div>' +
             '<div class="sub">' + esc(t.sub) + '</div></div>';
    }).join("") + '</div>';
  }

  // ---- interactive grouped-bar chart (pocket vs benchmark) ----------------
  function groupedBars(label, series) {
    var W = 380, H = 200, padL = 34, padR = 12, padT = 20, padB = 28;
    var plotW = W - padL - padR, plotH = H - padT - padB, baseY = padT + plotH;
    var vals = [];
    series.forEach(function (s) { if (s.pocket != null) vals.push(s.pocket); if (s.benchmark != null) vals.push(s.benchmark); });
    var yMax = Math.max(1, Math.ceil((Math.max.apply(null, vals.concat([0])) * 1.18) * 10) / 10);
    function y(v) { return padT + plotH * (1 - v / yMax); }
    var groupW = plotW / series.length, barW = 26, gap = 9;

    var grid = "";
    [0, yMax / 2, yMax].forEach(function (g) {
      grid += '<line class="grid" x1="' + padL + '" y1="' + y(g) + '" x2="' + (W - padR) + '" y2="' + y(g) + '"/>' +
              '<text class="vlabel" x="' + (padL - 5) + '" y="' + (y(g) + 3) + '" text-anchor="end">' + fmtNum(g, 1) + '%</text>';
    });

    var bars = "";
    series.forEach(function (s, i) {
      var cx = padL + groupW * (i + 0.5);
      var pX = cx - barW - gap / 2, bX = cx + gap / 2;
      if (s.pocket != null) {
        var ph = baseY - y(s.pocket);
        bars += '<rect class="bar" x="' + pX + '" y="' + y(s.pocket) + '" width="' + barW + '" height="' + Math.max(0, ph) + '" rx="2" fill="var(--deployed)" data-tip="' + esc(label) + ' pocket · ' + s.label + ': ' + pct(s.pocket) + '"></rect>' +
                '<text class="vlabel" x="' + (pX + barW / 2) + '" y="' + (y(s.pocket) - 4) + '" text-anchor="middle">' + fmtNum(s.pocket, 2) + '</text>';
      } else if (s.benchmark != null) {
        // window not yet computed for this scope — honest dashed placeholder
        bars += '<rect x="' + pX + '" y="' + (baseY - 3) + '" width="' + barW + '" height="3" rx="1.5" fill="none" stroke="var(--muted-2)" stroke-dasharray="3 3" data-tip="' + esc(label) + ' · ' + s.label + ': fills on next daily refresh"></rect>';
      }
      if (s.benchmark != null) {
        var bh = baseY - y(s.benchmark);
        bars += '<rect class="bar" x="' + bX + '" y="' + y(s.benchmark) + '" width="' + barW + '" height="' + Math.max(0, bh) + '" rx="2" fill="var(--idle)" data-tip="benchmark · ' + s.label + ': ' + pct(s.benchmark) + '"></rect>' +
                '<text class="vlabel" x="' + (bX + barW / 2) + '" y="' + (y(s.benchmark) - 4) + '" text-anchor="middle">' + fmtNum(s.benchmark, 2) + '</text>';
      }
      bars += '<text class="xlabel" x="' + cx + '" y="' + (baseY + 16) + '" text-anchor="middle">' + esc(s.label) + '</text>';
    });

    return '<svg class="chart" viewBox="0 0 ' + W + ' ' + H + '" role="img" aria-label="' + esc(label) + ' pocket vs benchmark APY by window">' +
           grid + '<line class="axis" x1="' + padL + '" y1="' + baseY + '" x2="' + (W - padR) + '" y2="' + baseY + '"/>' + bars + '</svg>';
  }

  var WIN_LABEL = { "1day": "1d", "7day": "7d", "30day": "30d" };

  // ---- prospect-facing visuals: why a DAO would pick kpk ------------------
  function prospectSection(d) {
    var a = firmAlpha(d);
    if (!a) return "";

    // "Per $1M deployed" — concrete translation of the yield + alpha for prospects
    function per1m(code) {
      var p = a.parts[code]; if (!p) return "";
      var k = p.apy / 100 * 1e6, bm = p.bench / 100 * 1e6, al = k - bm;
      return '<div class="icard"><div class="k">Per $1M deployed · ' + code + '</div>' +
        '<div class="v green">' + fmtUsd(k) + '<span style="font-size:12px;color:var(--muted)"> / yr</span></div>' +
        '<div class="sub">vs ' + fmtUsd(bm) + ' at market benchmark · <span style="color:var(--deployed)">+' + fmtUsd(al) +
        ' alpha</span> · $0 if left idle</div></div>';
    }

    return '<section class="section"><h2>What active management delivers</h2>' +
      '<div class="benchgrid">' + per1m("USD") + per1m("ETH") + '</div>' +
      '<div class="foot" style="margin-top:14px">Illustrative, based on current deployment and benchmark rates — not a forecast or guarantee. ' +
      'Excess return is gross of fees and reflects current-window, protocol-reported yields. Past and current performance do not guarantee future results.</div>' +
      '</section>';
  }

  // ---- donut charts (interactive: hover slices for tooltips) --------------
  var CLIENT_COLORS = ["#1F1F1F", "#454440", "#6C6B67", "#97968F", "#BEBDB6", "#807F79"];

  function donut(segs, opts) {
    opts = opts || {};
    var size = opts.size || 180, sw = opts.thickness || 26;
    var r = (size - sw) / 2, cx = size / 2, cy = size / 2, C = 2 * Math.PI * r;
    var total = segs.reduce(function (s, x) { return s + (x.value || 0); }, 0) || 1;
    var off = 0, arcs = "";
    segs.forEach(function (s) {
      if (!(s.value > 0)) return;
      var frac = s.value / total, len = frac * C;
      arcs += '<circle class="slice" cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="' + s.color + '" ' +
        'stroke-width="' + sw + '" stroke-dasharray="' + len.toFixed(2) + ' ' + (C - len).toFixed(2) + '" ' +
        'stroke-dashoffset="' + (-off).toFixed(2) + '" data-tip="' + esc(s.label) + ': ' + fmtUsd(s.value) +
        ' (' + fmtNum(frac * 100, 1) + '%)" data-c-top="' + fmtCompact(s.value) + '" data-c-bottom="' + esc(s.label) + '"></circle>';
      off += len;
    });
    var center = "";
    if (opts.centerTop) center += '<text class="dc-top" x="' + cx + '" y="' + (cy - 1) + '" text-anchor="middle">' + esc(opts.centerTop) + '</text>';
    if (opts.centerBottom) center += '<text class="dc-bot" x="' + cx + '" y="' + (cy + 13) + '" text-anchor="middle">' + esc(opts.centerBottom) + '</text>';
    return '<svg class="donut" viewBox="0 0 ' + size + ' ' + size + '" role="img" aria-label="allocation donut">' +
      '<g transform="rotate(-90 ' + cx + ' ' + cy + ')">' + arcs + '</g>' + center + '</svg>';
  }

  function donutLegend(segs) {
    var total = segs.reduce(function (s, x) { return s + (x.value || 0); }, 0) || 1;
    return '<div class="dlegend">' + segs.filter(function (s) { return s.value > 0; }).map(function (s) {
      return '<div class="lrow"><span class="ldot" style="background:' + s.color + '"></span>' +
        '<span class="llab">' + esc(s.label) + '</span><span class="lval">' + fmtUsd(s.value) + '</span>' +
        '<span class="lpct">' + fmtNum(s.value / total * 100, 1) + '%</span></div>';
    }).join("") + '</div>';
  }

  function clientDenomSegs(c) {
    return [
      { label: "USD", value: c.buckets.USD.value_usd, color: "var(--deployed)" },
      { label: "ETH", value: c.buckets.ETH.value_usd, color: "var(--eth)" },
      { label: "EUR", value: c.buckets.EUR.value_usd, color: "var(--eur)" },
      { label: "Other", value: (c.unclassified && c.unclassified.value_usd) || 0, color: "#C6C5BE" }
    ].filter(function (s) { return s.value > 0; });
  }

  function compositionSection(d) {
    var f = d.firm;
    var clientSegs = d.clients.slice().sort(function (a, z) { return z.total_usd - a.total_usd; })
      .map(function (c, i) { return { label: c.name, value: c.total_usd, color: CLIENT_COLORS[i % CLIENT_COLORS.length] }; })
      .filter(function (s) { return s.value > 0; });
    var denomSegs = clientDenomSegs(f);
    function body(id, segs, hidden) {
      return '<div id="' + id + '" class="comp-body' + (hidden ? ' hidden' : '') + '">' +
        donut(segs, { size: 188, thickness: 28, centerTop: fmtCompact(f.total_usd), centerBottom: "Total AUM" }) +
        donutLegend(segs) + '</div>';
    }
    return '<section class="section"><h2>AUM composition</h2><div class="composition">' +
      '<div class="comp-head"><span class="t">How the ' + fmtUsd(f.total_usd) + ' is allocated</span>' +
      '<span class="toggle"><button data-mode="client" class="active" onclick="window.__setFirmPie(\'client\')">By client</button>' +
      '<button data-mode="denom" onclick="window.__setFirmPie(\'denom\')">By denomination</button></span></div>' +
      body("firmpie-client", clientSegs, false) + body("firmpie-denom", denomSegs, true) +
      '</div></section>';
  }

  window.__setFirmPie = function (mode) {
    var cl = document.getElementById("firmpie-client"), dn = document.getElementById("firmpie-denom");
    if (!cl || !dn) return;
    cl.classList.toggle("hidden", mode !== "client");
    dn.classList.toggle("hidden", mode !== "denom");
    document.querySelectorAll(".composition .toggle button").forEach(function (b) {
      b.classList.toggle("active", b.dataset.mode === mode);
    });
  };

  // ---- shared tooltip -----------------------------------------------------
  var TTIP = null;
  function ensureTip() { if (!TTIP) { TTIP = document.createElement("div"); TTIP.className = "tt"; TTIP.style.display = "none"; document.body.appendChild(TTIP); } return TTIP; }
  function tipShow(e, text) { var t = ensureTip(); t.textContent = text; t.style.display = "block"; tipMove(e); }
  function tipMove(e) { var t = ensureTip(), pad = 14, w = t.offsetWidth, h = t.offsetHeight, x = e.clientX + pad, y = e.clientY + pad;
    if (x + w > window.innerWidth - 8) x = e.clientX - w - pad; if (y + h > window.innerHeight - 8) y = e.clientY - h - pad;
    t.style.left = x + "px"; t.style.top = y + "px"; }
  function tipHide() { if (TTIP) TTIP.style.display = "none"; }
  // Catmull-Rom → cubic-bezier smoothing for curved chart lines.
  function smoothPath(pts) {
    if (!pts.length) return "";
    if (pts.length < 3) return pts.map(function (p, i) { return (i ? "L" : "M") + p[0].toFixed(1) + " " + p[1].toFixed(1); }).join(" ");
    var d = "M" + pts[0][0].toFixed(1) + " " + pts[0][1].toFixed(1);
    for (var i = 0; i < pts.length - 1; i++) {
      var p0 = pts[i - 1] || pts[i], p1 = pts[i], p2 = pts[i + 1], p3 = pts[i + 2] || pts[i + 1];
      var c1x = p1[0] + (p2[0] - p0[0]) / 6, c1y = p1[1] + (p2[1] - p0[1]) / 6;
      var c2x = p2[0] - (p3[0] - p1[0]) / 6, c2y = p2[1] - (p3[1] - p1[1]) / 6;
      d += " C" + c1x.toFixed(1) + " " + c1y.toFixed(1) + " " + c2x.toFixed(1) + " " + c2y.toFixed(1) + " " + p2[0].toFixed(1) + " " + p2[1].toFixed(1);
    }
    return d;
  }

  // attach hover tooltips to any [data-tip] elements (idempotent; safe to call
  // again after re-rendering charts).
  function wireTips(root) {
    (root || document).querySelectorAll("[data-tip]").forEach(function (el) {
      if (el.__tw) return; el.__tw = 1;
      el.addEventListener("mouseenter", function (e) { tipShow(e, el.getAttribute("data-tip")); });
      el.addEventListener("mousemove", tipMove);
      el.addEventListener("mouseleave", tipHide);
    });
  }

  // ---- Performance vs benchmark, per time horizon, with client selector ----
  var BPERF = null;
  function benchPerfSection(d) {
    var b = d.benchmarks || {};
    if (!b.enabled) return "";
    BPERF = d;
    var chips = '<button class="chip on" aria-pressed="true" data-bp="__firm">All mandates</button>' +
      d.clients.map(function (c) { return '<button class="chip" aria-pressed="false" data-bp="' + esc(c.name) + '">' + esc(c.name) + '</button>'; }).join("");
    return '<section class="section"><h2>Performance vs benchmark</h2>' +
      '<div class="cperf-chips" style="margin-bottom:16px">' + chips + '</div>' +
      '<div id="bperf-body"></div>' +
      '<div class="foot" style="margin-top:14px">KPK deployed USD/ETH yield vs the vaults.fyi benchmark for the same denomination, across the 1-day, 7-day and 30-day APY windows. ' +
      'Select a mandate to isolate its performance, or “All mandates” for the aggregate. Excess return = deployed capital × (APY − benchmark), current window. No cross-asset blending; EUR has no upstream benchmark.</div></section>';
  }
  function _pocketSeries(d, scope, code) {
    var b = d.benchmarks, cur = b.current_window;
    // Fallback for snapshots without per-client window series: the client's
    // current-window deployed APY (from its buckets) still fills that window.
    var clientObj = (scope === "__firm") ? null : d.clients.filter(function (x) { return x.name === scope; })[0];
    return (b.windows || ["1day", "7day", "30day"]).map(function (w) {
      var pk = (scope === "__firm") ? (b[code].pocket || {})[w] : ((b[code].by_client || {})[scope] || {})[w];
      if (pk == null && clientObj && w === cur && clientObj.buckets[code] && clientObj.buckets[code].deployed_usd) {
        pk = clientObj.buckets[code].avg_apy_pct;
      }
      return { label: WIN_LABEL[w] || w, pocket: pk, benchmark: (b[code].benchmark || {})[w] };
    });
  }
  function drawBenchPerf(scope) {
    var host = document.getElementById("bperf-body"); if (!host || !BPERF) return;
    var d = BPERF, b = d.benchmarks, cur = b.current_window;
    var bench = { USD: (b.USD.benchmark || {})[cur], ETH: (b.ETH.benchmark || {})[cur] };
    var name, buckets, alpha;
    if (scope === "__firm") {
      name = "All mandates"; buckets = d.firm.buckets;
      var fa = firmAlpha(d); alpha = fa ? { excess: fa.excess_usd, bps: fa.bps } : null;
    } else {
      var c = d.clients.filter(function (x) { return x.name === scope; })[0];
      if (!c) { host.innerHTML = ""; return; }
      name = c.name; buckets = c.buckets; alpha = clientAlpha(c, bench);
    }
    var head = alpha ? '<div class="alphahead" style="margin-bottom:16px"><div class="ah-main">' +
      '<span class="ah-v ' + (alpha.excess >= 0 ? "pos" : "neg") + '">' + (alpha.excess >= 0 ? "+" : "") + fmtCompact(alpha.excess) + '</span>' +
      '<span class="ah-k">' + esc(name) + ' — estimated annual excess return vs benchmark</span></div>' +
      '<div class="ah-sub">' + (alpha.bps >= 0 ? "+" : "") + fmtNum(alpha.bps, 0) + ' bps capital-weighted active return (USD + ETH deployed)</div></div>' : "";

    function card(code) {
      var series = _pocketSeries(d, scope, code), bk = buckets[code], bm = bench[code];
      var curIdx = (b.windows || ["1day", "7day", "30day"]).indexOf(cur);
      var pkCur = (curIdx >= 0 && series[curIdx]) ? series[curIdx].pocket : null;  // includes client fallback
      var hasData = series.some(function (s) { return s.pocket != null; });
      if (!hasData || !bk || !bk.deployed_usd) {
        return '<div class="benchcard"><div class="bh"><div class="t"><span class="dot ' + code + '"></span>' + code + '</div></div>' +
          '<div class="cp-empty">No deployed ' + code + ' for this mandate.</div></div>';
      }
      var delta = (pkCur != null && bm != null) ? pkCur - bm : null;
      var mbase = (bk.measured_usd != null) ? bk.measured_usd : bk.deployed_usd;
      var ex = (delta != null) ? mbase * delta / 100 : null;
      var pill = (delta == null) ? "" : '<span class="pill ' + (delta >= 0 ? "up" : "down") + '">' + (delta >= 0 ? "▲ +" : "▼ ") + fmtNum(Math.abs(delta), 2) + '% vs benchmark</span>';
      return '<div class="benchcard"><div class="bh"><div class="t"><span class="dot ' + code + '"></span>' + code + ' vs benchmark</div>' + pill + '</div>' +
        groupedBars(code, series) +
        '<div class="blegend"><span><i class="pk"></i>KPK</span><span><i class="bm"></i>benchmark</span></div>' +
        '<div class="cap" style="margin-top:8px">Deployed ' + fmtUsd(bk.deployed_usd) +
        (ex != null ? ' · <strong style="color:var(--deployed)">' + (ex >= 0 ? "+" : "") + fmtCompact(ex) + ' / yr excess</strong>' : "") + '</div></div>';
    }
    host.innerHTML = head + '<div class="benchgrid">' + card("USD") + card("ETH") + '</div>';
    wireTips(host);
  }
  function wireBenchPerf() {
    var body = document.getElementById("bperf-body"); if (!body) return;
    var section = body.closest(".section");
    section.querySelectorAll(".cperf-chips .chip").forEach(function (bn) { bn.addEventListener("click", function () {
      section.querySelectorAll(".cperf-chips .chip").forEach(function (o) { o.classList.remove("on"); o.setAttribute("aria-pressed", "false"); });
      bn.classList.add("on"); bn.setAttribute("aria-pressed", "true");
      drawBenchPerf(bn.dataset.bp);
    }); });
    drawBenchPerf("__firm");
  }

  function render(d) {
    var app = document.getElementById("app");
    var f = d.firm, hist = d.history || {};
    var badge = (d.mode==="sample") ? '<span class="badge">sample data</span>' : '';
    var dep = f.deployed_usd != null ? f.deployed_usd : f.total_usd;
    var idle = f.idle_usd || 0;

    var html = '';
    html += '<div class="topbar"><div class="brand">'+
            '<span class="logo-mark"><svg viewBox="0 0 120 120" role="img" aria-label="KPK">'+
            '<g fill="var(--text)" stroke="var(--text)" stroke-width="11" stroke-linejoin="round">'+
            '<polygon points="22,22 52,22 22,52"/><polygon points="22,98 52,98 22,68"/>'+
            '<polygon points="104,22 104,98 56,60"/></g></svg></span>'+
            '<span class="logo"></span>'+
            '<span class="sub">Assets Under Management · On behalf of clients</span></div>'+
            '<div class="meta">Updated <span class="num">'+esc(d.updated_at||d.date)+'</span>'+badge+
            '<br/>APY window <span class="num">'+esc(d.apy_window)+'</span></div></div>';

    html += '<section class="hero"><div class="eyebrow">Total client assets under management, onchain</div>'+
            '<div class="total"><span class="cur">$</span><span class="amt" data-count="'+Math.round(f.total_usd)+'">'+fmtNum(f.total_usd,0)+'</span></div>'+
            '<div class="accent-rule"></div>'+
            '<div class="alloc">'+ tbarBig(dep, idle) +
              '<div class="legend">'+
                '<span class="leg"><i class="sw dep"></i><span class="lab">Deployed</span> <span class="val">'+fmtUsd(dep)+'</span> <span class="pc">'+share(dep,f.total_usd)+'</span></span>'+
                '<span class="leg"><i class="sw idle"></i><span class="lab">Idle</span> <span class="val">'+fmtUsd(idle)+'</span> <span class="pc">'+share(idle,f.total_usd)+'</span></span>'+
              '</div>'+
              '<div class="recon">Deployed + idle = total managed · idle assets are reported but excluded from all yield figures.</div>'+
            '</div>'+
            '</section>';

    // Lead with performance vs benchmark, then alpha + prospect value, then allocation.
    html += kpiBand(d);
    html += benchPerfSection(d);
    html += prospectSection(d);
    html += compositionSection(d);

    html += '<section class="section"><h2>Assets &amp; yield by denomination</h2><div class="denoms">'+
            denomPanel("USD", f.buckets.USD, hist.by_denom && hist.by_denom.USD)+
            denomPanel("ETH", f.buckets.ETH, hist.by_denom && hist.by_denom.ETH)+
            denomPanel("EUR", f.buckets.EUR, hist.by_denom && hist.by_denom.EUR)+
            '</div></section>';

    var maxTotal = d.clients.reduce(function(m,c){return Math.max(m,c.total_usd);},0);
    html += '<section class="section"><h2>By client</h2><div class="clients">'+
            d.clients.map(function(c){return clientCard(c,maxTotal,hist,d.benchmarks);}).join("")+'</div></section>';

    if (d.moved_funds && d.moved_funds.show_on_dashboard && d.moved_funds.total_usd) {
      html += '<div class="moved"><div class="k">'+esc(d.moved_funds.label||"Funds moved to date")+'</div>'+
              '<div class="v">'+fmtUsd(d.moved_funds.total_usd)+'</div>'+
              '<div class="note">Cumulative deployment volume over time (a flow), not assets currently held. Shown separately from AUM and never summed with it. Source: '+esc(d.moved_funds.source)+'.</div></div>';
    }

    html += '<div class="foot"><strong>Methodology &amp; disclosures.</strong> Figures represent client assets under KPK\'s management, not KPK\'s own balance sheet. Assets under management = deployed + idle. '+
            '<strong>Alpha</strong> is the deployed, TVL-weighted APY in a denomination minus the vaults.fyi reference benchmark for that same denomination; '+
            'excess return = benchmarked deployed capital × that spread. No cross-asset blending and no risk-adjustment. '+
            'APY and benchmark are current-'+esc(d.apy_window)+'-window figures, <strong>gross of fees</strong> and reflect protocol-reported yields '+
            '(including incentive rewards) — an <strong>annualized run-rate, not a realized historical return</strong>. '+
            'Idle assets are reported but excluded from all yield and alpha figures. EUR has no upstream benchmark. '+
            'Coverage: yield-bearing positions are sourced from vaults.fyi; token holdings its indexer does not cover '+
            '(e.g. weETH, osGNO, COW, NXM) are read directly on-chain and priced at spot — these are counted in AUM but '+
            'carry no APY and never enter the alpha calculations. '+
            (f.unclassified && f.unclassified.value_usd
              ? 'Non-USD/ETH/EUR holdings (e.g. governance tokens, '+fmtUsd(f.unclassified.value_usd)+') are included in AUM but not in any yield or alpha. '
              : '')+
            'Source: vaults.fyi. Figures are point-in-time and informational, not investment advice.</div>';

    app.innerHTML = html;
    attachInteractivity();
  }

  // ---- interactivity (non-destructive: full dashboard renders even if this no-ops) ----
  function countUp(el, target) {
    var dur = 3000, t0 = null;
    function frame(ts) {
      if (t0 === null) t0 = ts;
      var p = Math.min((ts - t0) / dur, 1), e = 1 - Math.pow(1 - p, 3);
      el.textContent = new Intl.NumberFormat("en-US").format(Math.round(target * e));
      if (p < 1) requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  }

  function attachInteractivity() {
    try {
      var reduce = window.matchMedia && matchMedia("(prefers-reduced-motion: reduce)").matches;

      // hover tooltips (shared floating element)
      wireTips(document);

      // interactive charts
      wireBenchPerf();

      // donut focus: hovering a slice dims the others and shows its value in the center
      document.querySelectorAll(".donut").forEach(function (svg) {
        var slices = svg.querySelectorAll(".slice");
        var top = svg.querySelector(".dc-top"), bot = svg.querySelector(".dc-bot");
        var t0 = top ? top.textContent : "", b0 = bot ? bot.textContent : "";
        slices.forEach(function (sl) {
          sl.addEventListener("mouseenter", function () {
            slices.forEach(function (o) { o.style.opacity = (o === sl) ? "1" : "0.22"; });
            if (top && sl.dataset.cTop) top.textContent = sl.dataset.cTop;
            if (bot && sl.dataset.cBottom) bot.textContent = sl.dataset.cBottom;
          });
        });
        svg.addEventListener("mouseleave", function () {
          slices.forEach(function (o) { o.style.opacity = ""; });
          if (top) top.textContent = t0; if (bot) bot.textContent = b0;
        });
      });

      // headline count-up on load
      var amt = document.querySelector(".hero .total .amt");
      if (amt && amt.dataset.count && !reduce) countUp(amt, +amt.dataset.count);
    } catch (e) { /* interactivity is enhancement-only; never block the render */ }
  }

  // larger hero variant of the split bar
  function tbarBig(deployed, idle) {
    var total = (deployed||0)+(idle||0);
    var dp = total?(deployed/total)*100:0, ip = total?(idle/total)*100:0;
    return '<div class="splitbar" role="img" aria-label="'+share(deployed,total)+' deployed, '+share(idle,total)+' idle">'+
           '<span class="seg dep" style="width:'+dp+'%"></span><span class="seg idle" style="width:'+ip+'%"></span></div>';
  }

  function fail(msg) {
    document.getElementById("app").innerHTML = '<div style="color:var(--warn);padding:40px 0">Could not load snapshot. '+esc(msg)+'</div>';
  }

  if (window.__AUM_DATA__) {
    render(window.__AUM_DATA__);
  } else {
    fetch("../data/latest.json", { cache:"no-store" })
      .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
      .then(render).catch(function(e){ fail(String(e.message||e)); });
  }

  // Stale-cache guard: browsers may serve a cached data.js. When the page is
  // served over http(s), re-fetch it bypassing the cache and re-render if a
  // newer snapshot exists. (The standalone file inlines data — unaffected.)
  if (/^https?:$/.test(location.protocol)) {
    fetch("data.js?v=" + Date.now(), { cache: "no-store" })
      .then(function (r) { if (!r.ok) throw 0; return r.text(); })
      .then(function (t) {
        var m = t.match(/=\s*(\{[\s\S]*\});?\s*$/);
        if (!m) return;
        var fresh = JSON.parse(m[1]);
        var cur = window.__AUM_DATA__;
        if (!cur || String(fresh.updated_at) !== String(cur.updated_at)) {
          window.__AUM_DATA__ = fresh;
          render(fresh);
        }
      })
      .catch(function () { /* enhancement only */ });
  }
})();
</script>
</body>
</html>
