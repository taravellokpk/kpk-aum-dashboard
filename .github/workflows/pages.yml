name: Deploy dashboard to Pages

on:
  push:
    branches: [main]     # code/data changes pushed manually
  workflow_dispatch: {}  # manual deploy button
  workflow_run:          # redeploy after every daily data refresh
    workflows: ["Daily AUM refresh"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (auto-enables on first run)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload dashboard folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
